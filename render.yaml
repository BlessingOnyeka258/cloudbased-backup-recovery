services:
  # Backend API
  - type: web
    name: cloud-recover-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: node index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cloud-recover-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  # Frontend Web App
  - type: static
    name: cloud-recover-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    headers:
      - path: /*
        name: Cache-Control
        value: max-age=0, no-cache, no-store, must-revalidate

databases:
  - name: cloud-recover-db
    plan: free
